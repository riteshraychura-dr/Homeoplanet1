
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeoCare Pro AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --primary-h: 174; /* Hue */
            --primary-s: 48%; /* Saturation */
            --primary-l: 41%; /* Lightness */
            
            --primary: hsl(var(--primary-h), var(--primary-s), var(--primary-l));
            --primary-dark: hsl(var(--primary-h), var(--primary-s), calc(var(--primary-l) - 10%));
            --primary-light: hsl(var(--primary-h), var(--primary-s), calc(var(--primary-l) + 45%));
            --primary-text: hsl(var(--primary-h), var(--primary-s), 10%);

            --sidebar-bg: #1e293b;
            --sidebar-link: #cbd5e1;
            --sidebar-hover: #334155;
            --sidebar-active: var(--primary);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            font-size: 16px;
        }
        .sidebar { background-color: var(--sidebar-bg); transition: transform 0.3s ease-in-out; }
        .sidebar a { color: var(--sidebar-link); transition: all 0.2s ease; }
        .sidebar a:hover { background-color: var(--sidebar-hover); color: white; }
        .sidebar a.active { background-color: var(--sidebar-active); color: white; font-weight: 600; }
        .page { display: none; }
        .page.active { display: block; }
        .stat-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        .modal { display: none; animation: fadeIn 0.3s ease; }
        .modal.active { display: flex; }
        .modal-content { animation: slideUp 0.4s ease; max-height: 90vh; }
        .low-stock { background-color: #fef9c3 !important; }
        .status-paid { background-color: #dcfce7; color: #166534; }
        .status-unpaid { background-color: #fee2e2; color: #991b1b; }
        .theme-swatch { cursor: pointer; transition: transform 0.2s; border: 2px solid transparent; }
        .theme-swatch:hover { transform: scale(1.1); }
        .theme-swatch.active { border-color: #0ea5e9; }
        
        .bg-primary { background-color: var(--primary); }
        .hover\:bg-primary-dark:hover { background-color: var(--primary-dark); }
        .text-primary { color: var(--primary); }
        .focus\:ring-primary:focus { --tw-ring-color: var(--primary); }
        
        #app { display: none; }
        #auth-screen {
            display: none;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #e2e8f0;
        }

        .history-card-locked {
            background-color: #f8fafc;
            border-left: 4px solid #94a3b8;
        }

        .action-btn:disabled {
            color: #94a3b8;
            cursor: not-allowed;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
        .ai-suggestion-box {
            background-color: #f3e8ff;
            border: 1px solid #d8b4fe;
            border-radius: 0.5rem;
            padding: 0.75rem;
            margin-top: 0.5rem;
            font-size: 0.875rem;
        }
        .ai-suggestion-item {
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            transition: background-color 0.2s;
        }
        .ai-suggestion-item:hover {
            background-color: #e9d5ff;
        }
        .chart-bar {
            background-color: var(--primary);
            transition: height 0.5s ease-out;
        }
        .chart-bar-expense {
            background-color: #f43f5e;
        }
        .tab-btn {
            border-color: transparent;
            color: #64748b; /* slate-500 */
        }
        .tab-btn:hover {
            border-color: #cbd5e1; /* slate-300 */
            color: #334155; /* slate-700 */
        }
        .tab-btn.active {
            border-color: var(--primary);
            color: var(--primary);
            font-weight: 600;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-100">

            </div>
        </aside>

        <!-- Main Content -->

            <header class="flex justify-between items-center p-4 bg-white border-b border-slate-200">
                <button id="open-sidebar" class="md:hidden text-slate-600">

            </header>

            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-slate-100 p-4 md:p-6 lg:p-8">
                <!-- All pages will be rendered here -->
            </main>
        </div>
    </div>

            render_dashboard() {

            async saveHistoryRecord(patientId, historyId = null, shouldLock = false) {
                const formEl = document.getElementById('history-form-container');
                const complaint = formEl.querySelector('#history-complaint').value;
                if (!complaint) { this.showToast("Chief Complaint is required.", true); return; }

                if (shouldLock) {
                    const enteredPassword = await this.showPasswordPrompt('lock');
                    if (enteredPassword === null) return; 
                    
                    const adminPassword = this.state.settings.adminPassword || 'Admin123';
                    if (enteredPassword !== adminPassword) {
                        this.showToast('Incorrect password. Record not saved.', true);
                        return;
                    }
                }

                const recordData = {
                    patientId: parseInt(patientId),
                    complaint,
                    fee: formEl.querySelector('#history-fee').value,
                    notes: formEl.querySelector('#history-notes').value,
                    prescription: this.state.currentPrescription,
                    presentIllness: formEl.querySelector('#history-present-illness').value,
                    pastHistory: formEl.querySelector('#history-past').value,
                    familyHistory: formEl.querySelector('#history-family').value,
                    followUpDate: formEl.querySelector('#history-follow-up').value,
                };

                if (historyId) {
                    const index = this.state.histories.findIndex(h => h.id == historyId);
                    if (index !== -1) {
                        const existingRecord = this.state.histories[index];
                        this.state.histories[index] = { ...existingRecord, ...recordData };
                        if (shouldLock) {
                            this.state.histories[index].isLocked = true;
                        }
                        this.showToast("History record updated.");
                    }
                } else {
                    recordData.id = Date.now();
                    recordData.isLocked = shouldLock;
                    this.state.histories.push(recordData);
                    this.showToast("History record saved.");
                }

                if (shouldLock) {
                    this.showToast("Record saved and locked!");
                }

                this.saveState();
                this.renderHistoryForPatient(patientId);
            },
            showPasswordPrompt(action) {

                    const closeModal = (password) => {

                    confirmBtn.addEventListener('click', () => {

                    cancelBtn.addEventListener('click', () => {

                            closeModal(passwordInput.value);

                    modal.classList.add('active');

cription.length > 0) { if (y > 240) { doc.addPage(); y = 20; } doc.setFont(undefined, 'bold').text('Prescription:', 20, y); doc.autoTable({ startY: y + 2, head: [['Medicine', 'Potency', 'Dosage']], body: h.prescription.map(p => [p.name, p.potency, p.dosage]), theme: 'grid', styles: { fontSize: 9 }, headStyles: { fillColor: [44, 120, 115] }, margin: { left: 20, right: 20} }); y = doc.autoTable.previous.finalY + 8; } if (h.notes) { if (y > 260) { doc.addPage(); y = 20; } doc.setFont(undefined, 'bold').text('Notes:', 20, y); y += 5; const notes = doc.splitTextToSize(h.notes, 170); doc.setFont(undefined, 'normal').text(notes, 20, y); y += (notes.length * 4) + 4; } doc.setLineDashPattern([1, 1], 0); doc.line(15, y, 195, y); doc.setLineDashPattern([], 0); y += 10; }); doc.save(`History-${patient.name.replace(/ /g, '_')}.pdf`); },

e(), 195, y + 22, { align: 'right' }); doc.setTextColor(0,0,0); } }); doc.save(`Invoice-${bill.id}-${patient.name.replace(/ /g, '_')}.pdf`); },

            generateMedicineReport() { const startDate = document.getElementById('report-start-date').value; const endDate = document.getElementById('report-end-date').value; if (!startDate || !endDate) { this.showToast('Please select a start and end date.', true); return; } const reportData = []; this.state.histories.filter(h => { const visitDate = new Date(h.id).toISOString().slice(0, 10); return visitDate >= startDate && visitDate <= endDate; }).forEach(h => { const patient = this.state.patients.find(p => p.id === h.patientId); if (patient && h.prescription) { h.prescription.forEach(p => { reportData.push({ 'Visit Date': new Date(h.id).toLocaleDateString(), 'Patient Name': patient.name, 'Patient Phone': patient.phone, 'Medicine': p.name, 'Potency': p.potency, 'Dosage': p.dosage, }); }); } }); if (reportData.length === 0) { this.showToast('No data found for the selected date range.'); return; } this.downloadCSV(reportData, `MedicineReport_${startDate}_to_${endDate}.csv`); },

            async getAiSymptomAnalysis() {
                const complaint = document.getElementById('history-complaint').value;
                const container = document.getElementById('ai-suggestion-container');
                if (!this.ai) {
                    container.innerHTML = `<div class="ai-suggestion-box text-red-600">Please set your Gemini API Key in the Settings page to use this feature.</div>`;
                    return;
                }
                if (!complaint) {
                    this.showToast('Please enter chief complaint first.', true);
                    return;
                }
                container.innerHTML = `<div class="ai-suggestion-box"> <i class="fas fa-spinner fa-spin"></i> Analyzing symptoms...</div>`;
                try {
                    const prompt = `You are a homeopathic expert. Based on the following chief complaint, suggest the top 3 most likely homeopathic remedies. For each remedy, provide a brief, one-sentence justification. Format the output as a numbered list. Symptoms: "${complaint}"`;
                    
                    const response = await this.ai.models.generateContent({
                        model: 'gemini-3-flash-preview',
                        contents: prompt
                    });
                    
                    const text = response.text;
                    const suggestions = text.split('\n').filter(line => line.match(/^\d\./));
                    
                    if (suggestions.length > 0) {
                        container.innerHTML = `<div class="ai-suggestion-box">
                            <p class="font-semibold mb-2 flex items-center gap-2"><i class="fas fa-lightbulb text-yellow-500"></i> AI Suggestions:</p>
                            ${suggestions.map(s => {
                                const remedyNameMatch = s.match(/\d\.\s*(\w+\s*\w*)/);
                                const remedyName = remedyNameMatch ? remedyNameMatch[1].trim() : "Unknown";
                                return `<p class="ai-suggestion-item" data-remedy="${remedyName}">${s}</p>`;
                            }).join('')}
                        </div>`;

                        container.querySelectorAll('.ai-suggestion-item').forEach(item => {
                            item.addEventListener('click', () => {
                                document.getElementById('prescription-search').value = item.dataset.remedy;
                                this.showToast(`${item.dataset.remedy} added to prescription search.`);
                            });
                        });
                    } else {
                         container.innerHTML = `<div class="ai-suggestion-box">No specific remedies could be determined. Please add more details.</div>`;
                    }
                } catch(error) {
                    console.error("AI Analysis Error:", error);
                    container.innerHTML = `<div class="ai-suggestion-box text-red-600">Could not get AI suggestions. Please check your API key or network.</div>`;
                    this.showToast('AI analysis failed.', true);
                }
            },
            updateFinancials() {
                const filter = document.getElementById('financials-date-filter').value;
                const now = new Date();
                let startDate, endDate = new Date();

                switch(filter) {
                    case 'this-month':
                        startDate = new Date(now.getFullYear(), now.getMonth(), 1);
                        break;
                    case 'last-month':
                        startDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                        endDate = new Date(now.getFullYear(), now.getMonth(), 0);
                        break;
                    case 'last-3-months':
                        startDate = new Date(now.getFullYear(), now.getMonth() - 2, 1);
                        break;
                    case 'this-year':
                        startDate = new Date(now.getFullYear(), 0, 1);
                        break;
                }

                const startDateStr = startDate.toISOString().slice(0,10);
                const endDateStr = endDate.toISOString().slice(0,10);

                const relevantBills = this.state.bills.filter(b => b.date >= startDateStr && b.date <= endDateStr && b.status === 'paid');
                const relevantExpenses = this.state.expenses.filter(e => e.date >= startDateStr && e.date <= endDateStr);

                const totalRevenue = relevantBills.reduce((sum, bill) => sum + bill.items.reduce((itemSum, item) => itemSum + (item.qty * item.price), 0), 0);
                const totalExpenses = relevantExpenses.reduce((sum, exp) => sum + exp.amount, 0);
                const netProfit = totalRevenue - totalExpenses;

                document.getElementById('financials-revenue').textContent = `₹${totalRevenue.toLocaleString('en-IN')}`;
                document.getElementById('financials-expenses').textContent = `₹${totalExpenses.toLocaleString('en-IN')}`;
                document.getElementById('financials-profit').textContent = `₹${netProfit.toLocaleString('en-IN')}`;

                this.renderMonthlyBarChart(startDate);
                this.renderExpensePieChart(relevantExpenses);
            },
            renderMonthlyBarChart(startDate) {
                const container = document.getElementById('monthly-chart-container');
                const months = Array.from({length: 3}, (_, i) => new Date(startDate.getFullYear(), startDate.getMonth() + i, 1));
                
                const monthlyData = months.map(month => {
                    const monthStart = month.toISOString().slice(0,8) + '01';
                    const monthEnd = new Date(month.getFullYear(), month.getMonth() + 1, 0).toISOString().slice(0,10);
                    
                    const revenue = this.state.bills
                        .filter(b => b.date >= monthStart && b.date <= monthEnd && b.status === 'paid')
                        .reduce((sum, bill) => sum + bill.items.reduce((itemSum, item) => itemSum + (item.qty * item.price), 0), 0);

                    const expenses = this.state.expenses
                        .filter(e => e.date >= monthStart && e.date <= monthEnd)
                        .reduce((sum, exp) => sum + exp.amount, 0);

                    return { month: month.toLocaleString('default', { month: 'short' }), revenue, expenses };
                });

                const maxVal = Math.max(1, ...monthlyData.flatMap(d => [d.revenue, d.expenses]));
                container.innerHTML = monthlyData.map(d => {
                    const revHeight = maxVal > 0 ? (d.revenue / maxVal) * 100 : 0;
                    const expHeight = maxVal > 0 ? (d.expenses / maxVal) * 100 : 0;
                    return `
                        <div class="flex-1 flex flex-col items-center justify-end h-full">
                            <div class="flex items-end h-full w-full justify-center gap-1">
                                <div class="chart-bar w-1/2" style="height: ${revHeight}%" title="Revenue: ₹${d.revenue.toLocaleString()}"></div>
                                <div class="chart-bar-expense w-1/2" style="height: ${expHeight}%" title="Expenses: ₹${d.expenses.toLocaleString()}"></div>
                            </div>
                            <p class="text-xs text-slate-500 mt-2">${d.month}</p>
                        </div>
                    `;
                }).join('');
            },
            renderExpensePieChart(expenses) {
                const container = document.getElementById('expense-pie-chart-container');
                const byCategory = expenses.reduce((acc, exp) => {
                    acc[exp.category] = (acc[exp.category] || 0) + exp.amount;
                    return acc;
                }, {});

                const totalExpenses = expenses.reduce((sum, exp) => sum + exp.amount, 0);
                if(totalExpenses === 0) {
                    container.innerHTML = `<p class="text-slate-500">No expense data for this period.</p>`;
                    return;
                }

                const colors = ['#34d399', '#fbbf24', '#60a5fa', '#f87171', '#9333ea'];
                let gradientParts = [];
                let currentPercentage = 0;
                let legendHTML = '<div class="ml-8 space-y-2">';

                Object.entries(byCategory).forEach(([category, amount], index) => {
                    const percentage = (amount / totalExpenses) * 100;
                    const color = colors[index % colors.length];
                    gradientParts.push(`${color} ${currentPercentage}% ${currentPercentage + percentage}%`);
                    currentPercentage += percentage;
                    legendHTML += `
                        <div class="flex items-center text-sm">
                            <div class="w-3 h-3 rounded-full mr-2" style="background-color: ${color}"></div>
                            <span>${category}: ₹${amount.toLocaleString('en-IN')} (${percentage.toFixed(1)}%)</span>
                        </div>
                    `;
                });
                legendHTML += '</div>';

                container.innerHTML = `
                    <div class="w-48 h-48 rounded-full" style="background: conic-gradient(${gradientParts.join(', ')})"></div>
                    ${legendHTML}
                `;
            },
            renderCommunicationLog(patientId) {
                const listEl = document.getElementById('comm-list');
                const comms = this.state.communications
                    .filter(c => c.patientId == patientId)
                    .sort((a,b) => b.id - a.id);
                listEl.innerHTML = comms.length > 0 ? comms.map(Templates.communicationLogItem).join('') : '<p class="text-center text-slate-500 text-sm py-4">No communication logs yet.</p>';
            },
            saveCommunicationLog(patientId) {
                const textEl = document.getElementById('new-comm-text');
                const text = textEl.value.trim();
                if (!text) return;
                
                const newComm = {
                    id: Date.now(),
                    patientId: parseInt(patientId),
                    text: text
                };
                this.state.communications.push(newComm);
                this.saveState();
                textEl.value = '';
                this.renderCommunicationLog(patientId);
                this.showToast('Log entry saved.');
            }
        };
